name: Weekly Data Update

on:
  schedule:
    # Every Sunday at 2:00 AM EST (7:00 AM UTC)
    - cron: '0 7 * * 0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas numpy scikit-learn

      - name: Pull fresh data from Boston Open Data
        run: python3 auto_update_data.py
        timeout-minutes: 15

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet -- '*.csv' || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zba_tracker.csv building_permits.csv property_assessment_fy2026.csv zba_cases_cleaned.csv
          git commit -m "Auto-update: weekly Boston Open Data refresh $(date +%Y-%m-%d)"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "### Data Updated" >> $GITHUB_STEP_SUMMARY
            echo "New data committed and pushed. Streamlit Cloud and Railway will auto-deploy." >> $GITHUB_STEP_SUMMARY
          else
            echo "### No New Data" >> $GITHUB_STEP_SUMMARY
            echo "All datasets are already current." >> $GITHUB_STEP_SUMMARY
          fi
