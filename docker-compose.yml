version: "3.8"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: permitiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    ports:
      - "5433:5432"  # 5433 to avoid conflict with local postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    volumes:
      - ./zba_cases_cleaned.csv:/app/zba_cases_cleaned.csv:ro
      - ./boston_parcels_zoning.geojson:/app/boston_parcels_zoning.geojson:ro
      - ./property_assessment_fy2026.csv:/app/property_assessment_fy2026.csv:ro
      - ./api/zba_model.pkl:/app/api/zba_model.pkl:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-CHANGE_ME}@db:5432/permitiq
      - PERMITIQ_API_KEY=${PERMITIQ_API_KEY:-}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - PERMITIQ_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
